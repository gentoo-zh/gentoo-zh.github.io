description = "Gentoo 中文社区——中文 Gentoo 用户的聚集地。维护 gentoo-zh overlay（中文输入法、字体等华文支持，及常用网络工具），做开箱即用的社区 Live ISO，汇总下载镜像与各类资源；装机用机遇到坑，来这儿一起折腾。"

# 全站日期格式（覆盖 Hextra 默认的 :date_long 英文长日期；与首页 ISO 一致）
dateFormat = "2006-01-02"

# 站点默认社交分享图（Hextra 用于 og:image / twitter:image，绝对化后输出）
images = ["img/og-cover.png"]

# 页脚备用联系邮箱（footer partial 读取；留空则不显示该行）
contactEmail = "zakk@gentoozh.org"

[navbar]
  displayTitle = false
  displayLogo = true
  width = "wide"
  [navbar.logo]
    path = "img/logo.webp"
    dark = "img/logo.webp"
    width = 44
    height = 39

[search]
  enable = true
  type = "flexsearch"
  [search.flexsearch]
    index = "content"
    tokenize = "forward"

[theme]
  default = "system"
  displayToggle = true

[footer]
  enable = true
  displayCopyright = true
  displayPoweredBy = true
  width = "normal"

[editURL]
  enable = true
  base = "https://github.com/Gentoo-zh/gentoo-zh.github.io/edit/master/content"

[displayUpdatedDate]
  enable = false

[blog]
  [blog.list]
    sortBy = "date"
    sortOrder = "desc"
    pagerSize = 20
    displayTags = true

[highlight]
  copy = { enable = true, display = "hover" }

[page]
  width = "wide"
  # "Copy as Markdown" / "View as Markdown" 页面菜单（Hextra v0.12，便于 LLM / 终端用户）
  [page.contextMenu]
    enable = true

[toc]
  displayTags = true

[comments]
  # 全站开启评论；首页用 hextra-home 布局、不出评论区，不受影响
  enable = true
  type = "giscus"
  # 评论存进本仓库的 GitHub Discussions，用 Announcements 分类（只有维护者和 giscus 能建帖）
  # 外观（配色、亮暗、界面语言）由主题的 giscus 覆盖处理，这里只配后端接线
  [comments.giscus]
    repo = "Gentoo-zh/gentoo-zh.github.io"
    repoId = "MDEwOlJlcG9zaXRvcnk3OTEwNDY2"
    category = "Announcements"
    categoryId = "DIC_kwDOAHi0Qs4DAMZA"
    mapping = "pathname"
    # pathname 映射用严格匹配，避免相似 URL 撞车
    strict = 1

[gitInfo]
  enable = false
